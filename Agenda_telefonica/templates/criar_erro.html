<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Contato</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='principal.css') }}">
</head>

<body>

    <h1 class="title">Novo Contato</h1>

    <div class="barra-opcoes">

        <a href="/principal">
            <button class="botao-opcao">
                Voltar para Agenda
            </button>
        </a>

    </div>

    <div class="container-formulario">

        <form class="form-contato" method="POST" action="{{ url_for('salvar') }}">

            <div class="campo">
                <label>Nome</label>
                <input type="text" name="nome" required>
            </div>

            <div class="campo">
                <label>Descrição</label>
                <textarea name="descricao" rows="4" required></textarea>
            </div>

            <div class="campo">
                <label>DDD</label>

                <select name="ddd">

                    {% if ddds %}
                    {% for ddd in ddds %}

                    <option value="{{ ddd.ddd }}">
                        {{ ddd.ddd }} | {{ ddd.estado }}
                    </option>

                    {% endfor %}
                    {% endif %}

                </select>
            </div>

            <div class="campo">
                <label>Número</label>
                <input type="text" name="numero" required>
            </div>

            <button type="submit" class="botao-salvar">
                Salvar contato
            </button>

        </form>

        <div class="mensagem-erro" id="mensagemErro" role="alert">
            <h2>Erro de criação</h2>
            <p>{{ erro or 'Ocorreu um erro ao salvar o contato. Verifique os dados e tente novamente.' }}</p>
        </div>

    </div>

</body>
</html>
