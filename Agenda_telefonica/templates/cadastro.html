<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="cadastro">
        <img src="logo.png" alt="logo">
        <img id="conecta" src="conectafacil.png" alt="conecta facil">

        <h1>É novo por aqui?</h1>
        <h4>Cadastre-se agora!</h4>

        <form>
        <div class="campo">
            <label>👤 Nome:</label>
            <input type="text" placeholder="Digite seu nome completo" required>
        </div>

        <div class="campo">
            <label>📞 Telefone:</label>
            <input type="tel" placeholder="Digite seu número" required>
        </div>

        <div class="campo">
            <label>🔑 Crie uma senha:</label>
            <input type="password" placeholder="Digite sua senha" required>
        </div>

        <div class="campo">
            <label>🔑 Repetir senha:</label>
            <input type="password" placeholder="Repita sua senha" required>
        </div>

        <button type="submit">Cadastrar</button>
        </form>
    </div>
</body>
</html>
